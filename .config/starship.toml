"""

[username]
disabled = false
show_always = true
# symbol = "¾░Çä"
format = '[$user ]($style)'

[os]
disabled = false

[os.symbols]
Arch = " ¾░úç "

[directory]
disabled = false
# home_symbol = "´Çò"
format = "[ ¯ù¥ $path ]($style)"
truncation_length = 3

# Shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
# [directory.substitutions]
# "/Documents" = "/¾░êÖ "
# "/Downloads" = "/´ÇÖ "
# "/Music" = "/´Çü "
# "/Pictures" = "/´Ç¥ "
# "/Videos" = "/´Ç¢ "
# "/Audios" = "/¯İ© "
# "/GitHub" = "/¯£Ñ "
# "/.config" = "/´Éú "
# "/Develop" = "/¾░▓ï "
# Keep in mind that the order matters. For example:
# "/Important Documents" = "/¾░êÖ´ä¬ "
# will not be replaced, because "/Documents" was already substituted before.
# So either put "/Important Documents" before "/Documents" or use the substituted version:
# "/Important ¾░êÖ " = "/¾░êÖ´ä¬ "

[time]
disabled = false
time_format = "%R"
format = '[ ´É║ $time ]($style)'

[cmd_duration]
disabled = false
show_milliseconds = true
min_time = 100
format = "[ ¯½┤ in $duration ]($style)"
style = "fg:lavender"

[character]
disabled = false
success_symbol = '[ÔØ»](bold fg:green)'
error_symbol = '[ÔØ»](bold fg:red)'

[git_branch]
symbol = "´äô"
format = '[ $symbol $branch ]($style)'

[git_status]
disabled = true
ahead = "´é¬ $count "
behind = "´é½ $count "
deleted = "´½ğ $count "
diverged = "´ù║ $count "
stashed = "´ÜÆ $count "
modified = "´ü▒ $count "
staged = "´üğ $count "
renamed = "´æÜ $count "
untracked = "´üÖ $count "
format = '[($all_status$ahead_behind)]($style)'

[lua]
