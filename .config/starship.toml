"$schema" = 'https://starship.rs/config-schema.json'

palette = 'catppuccin_mocha'
# [pastel, pastel_brite, catppuccin_mocha]

format = """
[Ôò¡](gray)\
$os\
$username\
$directory\
$git_branch\
$git_status\
$c\
$cpp\
$elixir\
$elm\
$golang\
$gradle\
$haskell\
$java\
$julia\
$kotlin\
$nodejs\
$nim\
$php\
$python\
$rust\
$scala\
$conda\
$docker_context\
$pixi\
$time\
$cmd_duration\
