source = ~/.config/hypr/theme-hyprlock.conf

background {
    monitor =
    path = ~/.cache/current_lockscreen.png
    blur_passes = 1
}

input-field {
    monitor =
    size = 400,75
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    outer_color = $outer_color
    inner_color = $inner_color
    font_color = $font_color
    fade_on_empty = true
    fade_timeout = 1000
    placeholder_text = Input Password
    hide_input = false
    check_color = $check_color
    fail_color = rgb(204, 34, 34)
    fail_text = $FAIL <b>($ATTEMPTS)</b>
    fail_transition = 100
    capslock_color = rgb(233, 173, 12)
    numlock_color = -1
    bothlock_color = -1
    invert_numlock = false
    swap_font_color = false
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$TIME"
    color = $font_color
    font_size = 55
    font_family = Fira Semibold
    position = -100, 40
    halign = right
    valign = bottom
    shadow_passes = 5
    shadow_size = 10
}

label {
    monitor =
    text = mening sare
    color = $font_color
    font_size = 20
    position = -100, 160
    halign = right
    valign = bottom
    shadow_passes = 5
    shadow_size = 10
}
