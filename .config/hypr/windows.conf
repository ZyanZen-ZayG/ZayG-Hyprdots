## Use hyprctl clients to look for window class

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# Example windowrule
# windowrule = match:class ^(kitty)$, float on
windowrule = match:class ^(jome)$, float on

# Example windowrule with multiple matchers
# windowrule = match:class ^(kitty)$ match:title ^(kitty)$, float on
# windowrule = match:class ^(firefox)$, opacity 0.80 0.80
windowrule = match:class ^(Code)$, opacity 0.80 0.80
windowrule = match:class ^(studio)$, opacity 0.80 0.80
windowrule = match:class ^(idea)$, opacity 0.80 0.80
windowrule = match:class ^(dev.warp.Warp)$, opacity 0.80 0.80
# windowrule = match:class ^(obsidian)$, opacity 0.80 0.80
windowrule = match:class ^(code-url-handler)$, opacity 0.80 0.80
windowrule = match:class ^(code-insiders-url-handler)$, opacity 0.80 0.80
# windowrule = match:class ^(kitty)$, opacity 0.90 0.90
windowrule = match:class ^(thunar)$, opacity 0.80 0.80
windowrule = match:class ^(nwg-look)$, opacity 0.80 0.80
windowrule = match:class ^(qt6ct)$, opacity 0.80 0.80
windowrule = match:class ^(pavucontrol)$, opacity 0.80 0.70
windowrule = match:class ^(org.kde.polkit-kde-authentication-agent-1)$, opacity 0.80 0.70
windowrule = match:class ^(polkit-gnome-authentication-agent-1)$, opacity 0.80 0.70
windowrule = match:class ^(hyprpolkitagent)$, opacity 0.80 0.70
windowrule = match:class ^(org.freedesktop.impl.portal.desktop.gtk)$, opacity 0.80 0.70
windowrule = match:class ^(org.freedesktop.impl.portal.desktop.hyprland)$, opacity 0.80 0.70

windowrule = match:class ^(qt6ct)$, float on
windowrule = match:class ^(nwg-look)$, float on
windowrule = match:class ^(thunar)$, float on
windowrule = match:class ^(thunar)$, size 70% 70%
windowrule = match:class ^(thunar)$, center on
windowrule = match:class ^(pavucontrol)$, float on
windowrule = match:class ^(org.kde.polkit-kde-authentication-agent-1)$, float on
windowrule = match:class ^(hyprpolkitagent)$, float on

# ==========================================================
# JetBrains IDEs (IntelliJ, PyCharm, Android Studio, etc.)
# Prevent focus stealing, improve popup appearance, fix sizing
# ==========================================================

# Prevent focus stealing ONLY from autocomplete popups (win0, win1, etc.) and splash screens
# but ALLOW focus for dialogs and important popups
windowrule = match:class ^(jetbrains|jetbrains-.*)$ match:float yes match:title ^(win\d+)$, no_initial_focus on
windowrule = match:class ^(jetbrains|jetbrains-.*)$ match:float yes match:title ^(win\d+)$, no_focus on
windowrule = match:class ^(jetbrains|jetbrains-.*)$ match:title ^splash$, no_initial_focus on
windowrule = match:class ^(jetbrains|jetbrains-.*)$ match:title ^splash$, no_focus on 

# Remove rounding for cleaner popup appearance
windowrule = match:class ^(jetbrains|jetbrains-.*)$ match:floating 1 match:title ^(|win.*)$, rounding 0


# layerrule = match:namespace waybar, blur on
layerrule = match:namespace tofi, ignore_alpha 0
layerrule = match:namespace dunst, ignore_alpha 0
layerrule = match:namespace dunst, blur on

# ==========================================================
# WORKSPACE RULES
# ==========================================================

# Bind workspace 3 to HDMI monitor
# When HDMI is connected, workspace 3 will appear on it
workspace = 3, monitor:HDMI-A-1
