######################
### SYSTEM CONTROL ###
######################

# System controls
bind = $mainMod, X, exit,
bind = SUPER SHIFT, L, exec, hyprlock
bind = SUPER, ESCAPE, exec, $powermenu
bind = Ctrl, Escape, exec, killall waybar || uwsm app -- waybar # toggle waybar

# Monitor mirroring
bind = $mainMod SHIFT, M, exec, ~/.local/bin/monitor-mirror-toggle.sh
bind = $mainMod CTRL, V, exec, ~/.local/bin/virtual-mirror-toggle.sh

# Nightlight toggle
bind = $mainMod, N, exec, ~/.local/bin/toggle-nightlight.sh

# Idle toggle (prevent auto-lock)
bind = $mainMod SHIFT, I, exec, ~/.local/bin/toggle-idle.sh

# Dismiss notifications
bind = $mainMod, D, exec, ~/.local/bin/notification-dismiss.sh

# Audio output switch
bind = $mainMod, F10, exec, ~/.local/bin/audio-switch.sh

# Show keybindings
bind = $mainMod, slash, exec, ~/.local/bin/show-keybindings.sh
